<aside id="docauto-panel" class="mau-panel">
  <header class="mau-header" id="mau-header-toggle">
    <div style="display:flex;align-items:center;gap:8px;">
      <img src="" class="mau-header-logo" alt="Logo" id="mau-logo" width="28" height="28" />
      <strong>ControlBun</strong>
      <span class="mau-header-badge">PRO</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span id="mau-user-email"
        style="font-size:11px;color:#94a3b8;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
        title=""></span>
      <button id="mau-btn-mapeos" title="Gestión de Mapeos"
        style="font-size:13px;width:auto;padding:4px 8px;gap:4px;display:flex;align-items:center;">🗂 Mapeos</button>
      <button id="mau-btn-settings" title="Ajustes"
        style="font-size:13px;width:auto;padding:4px 8px;gap:4px;display:flex;align-items:center;">⚙ Config</button>
    </div>
  </header>

  <section class="mau-body">

    <!-- ══ PANTALLA DE LOGIN ══ -->
    <div id="mau-login-screen">
      <p style="color:#94a3b8;font-size:13px;margin:0 0 16px;">Iniciá sesión para usar la extensión.</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input id="mau-login-email" type="email" placeholder="Email"
          style="background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.2);border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;outline:none;width:100%;box-sizing:border-box;" />
        <input id="mau-login-pass" type="password" placeholder="Contraseña"
          style="background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.2);border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;outline:none;width:100%;box-sizing:border-box;" />
        <button id="mau-login-btn" class="mau-btn">Ingresar</button>
        <button id="mau-login-google-btn" class="mau-btn mau-btn-secondary">Ingresar con Google</button>
        <p id="mau-login-error" style="color:#f87171;font-size:12px;margin:0;min-height:16px;"></p>
      </div>
    </div>

    <!-- ══ MODO TRABAJAR ══ -->
    <div id="mau-modo-trabajar" hidden>
            <div id="mau-dropzone" class="mau-dropzone" style="border: 2px dashed rgba(148,163,184,.3); border-radius: 8px; padding: 20px; text-align: center; margin: 10px 0; transition: all 0.2s;">
        <p style="color: #94a3b8; margin: 0; font-size: 13px;">Arrastrá archivos PDF aquí o</p>
        <div class="mau-actions" style="margin-top: 12px;">
          <button id="mau-seleccionar" class="mau-btn mau-btn-secondary">Seleccionar archivos</button>
          <input id="mau-file-input" type="file" accept="application/pdf,.pdf" multiple hidden />
        </div>
      </div>
      <div class="mau-actions">
        <button id="mau-detectar" class="mau-btn">Detectar requerimientos pendientes</button>
      </div>

      <div class="mau-progress-wrap">
        <div id="mau-progress-text">Sin procesamiento en curso</div>
        <div class="mau-progress-bar">
          <div id="mau-progress-inner"></div>
        </div>
      </div>

      <table class="mau-tabla">
        <thead>
          <tr>
            <th>Requerimiento</th>
            <th>Archivo asignado</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="mau-tabla-body"></tbody>
      </table>

      <button id="mau-procesar" class="mau-btn mau-btn-main">Procesar todo</button>
    </div>

  </section>
  <div id="mau-toast" class="mau-toast" role="status" aria-live="polite" hidden></div>
</aside>
