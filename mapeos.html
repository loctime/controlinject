<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control Documentario - Mapeos</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5b6473;
      --line: #d7dfeb;
      --primary: #0f5cc0;
      --primary-2: #2b7be6;
      --green: #0f8a4c;
      --green-2: #12a35a;
      --ok-bg: #ecfdf3;
      --ok-text: #0f7a3d;
      --err-bg: #fef2f2;
      --err-text: #b42318;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    /* ───────── PAGE SHELL ───────── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ───────── HEADER ───────── */
    .page-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: linear-gradient(130deg, #0f5cc0, #2b7be6);
      color: #fff;
      box-shadow: 0 2px 12px rgba(15, 92, 192, 0.25);
    }

    .page-header img { border-radius: 8px; background: #fff; padding: 3px; }
    .page-header h1 { font-size: 18px; font-weight: 700; }
    .page-header p { font-size: 12px; color: #c8deff; margin-top: 2px; }

    /* ───────── TABS NAV ───────── */
    .tabs-nav {
      flex-shrink: 0;
      display: flex;
      gap: 0;
      background: var(--card);
      border-bottom: 2px solid var(--line);
      padding: 0 24px;
    }

    .tab-btn {
      border: none;
      background: none;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 0;
      transform: none;
    }

    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn.active-green { color: var(--green); border-bottom-color: var(--green); }

    /* ───────── NO SESION ───────── */
    #no-sesion {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      gap: 8px;
    }

    /* ───────── TAB PANES ───────── */
    .tab-pane { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-pane.active { display: flex; }

    /* ── Mis Mapeos ── */
    #tab-mis-mapeos { overflow-y: auto; padding: 20px 24px; gap: 16px; }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .cards-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }

    /* ── CARDS ── */
    .card-wrap { display: flex; flex-direction: column; gap: 0; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 3px 12px rgba(16, 24, 40, 0.06);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.15s;
    }

    .card.card-active {
      border-color: var(--primary-2);
      box-shadow: 0 3px 14px rgba(43, 123, 230, 0.18);
    }

    .card.card-expanded {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom-color: transparent;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-active {
      font-size: 10px;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .card-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      font-size: 11px;
      background: #eef3fb;
      color: #1f3f74;
      border: 1px solid #d7e5ff;
      border-radius: 999px;
      padding: 2px 9px;
    }

    .card-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }

    /* ── CARD EXPAND PANEL ── */
    .card-expand {
      background: var(--card);
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 14px 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .expand-bloque {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #fafbfc;
    }

    .expand-bloque-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .expand-bloque-header strong { font-size: 12px; color: var(--green); }

    .expand-bloque input[type=text] {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
    }

    .expand-pags {
      font-size: 11px;
      color: var(--muted);
    }

    .expand-reqs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .req-chip {
      font-size: 11px;
      background: #fff8e6;
      color: #7c5e00;
      border: 1px solid #f0d98a;
      border-radius: 999px;
      padding: 2px 8px 2px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .req-chip-del {
      background: none;
      border: none;
      color: #c33;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      line-height: 1;
      border-radius: 0;
      transform: none;
    }

    .req-chip-del:hover { transform: none; color: #a00; }

    .expand-add-req {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .expand-add-req input {
      flex: 1;
      font-size: 11px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .expand-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

    /* ── Mappear Nuevo ── */
    #tab-nuevo { flex-direction: column; }

    .nuevo-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }

    .nuevo-bar label { font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap; }

    .nuevo-bar input[type=text] {
      flex: 1;
      max-width: 400px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    .nuevo-bar input[type=text]:focus { outline: none; border-color: var(--primary); }

    /* ── Dropzone ── */
    #nuevo-dropzone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 24px;
      border: 2px dashed var(--line);
      border-radius: 16px;
      background: var(--card);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    #nuevo-dropzone:hover, #nuevo-dropzone.dragover {
      border-color: var(--green);
      background: #f0fdf6;
    }

    .dropzone-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .dropzone-icon { font-size: 48px; }
    .dropzone-inner p { font-size: 15px; color: var(--muted); }
    .dropzone-inner small { font-size: 12px; color: #9ba8bc; }

    /* ── Workspace ── */
    #nuevo-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .ws-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #f0fdf6;
      border-bottom: 1px solid #c3e6d3;
    }

    .ws-bar .ws-filename {
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
      flex: 1;
    }

    .ws-bar .ws-status {
      font-size: 12px;
      color: var(--muted);
    }

    .ws-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Thumbnails panel ── */
    #ws-thumbs {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #f4f5f7;
      border-right: 1px solid var(--line);
    }

    .thumbs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .thumb {
      background: #fff;
      border: 2px solid #d0d4d8;
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      position: relative;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: border-color 0.1s, background 0.1s;
    }

    .thumb:hover { border-color: #87b3ff; }
    .thumb.selected { border-color: var(--primary); background: #e8f0ff; }
    .thumb.assigned { opacity: 0.65; }

    .thumb img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 2px;
    }

    .thumb-num {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
    }

    .thumb-tag {
      font-size: 11px;
      color: #444;
      text-align: center;
      line-height: 1.2;
      word-break: break-word;
    }

    .thumb.selected .thumb-tag,
    .thumb.assigned .thumb-tag {
      color: var(--green);
      font-weight: 600;
    }

    /* ── Bloques panel ── */
    #ws-bloques {
      width: 320px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 14px;
      background: var(--card);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ws-sel-info {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0;
    }

    .ws-bloque {
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fafbfc;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ws-bloque.active { border-color: var(--primary); background: #eef4ff; }

    .ws-bloque-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ws-bloque-header strong { font-size: 12px; color: var(--green); }

    .ws-bloque input[type=text] {
      flex: 1;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 5px;
      font-size: 12px;
    }

    .ws-bloque-del {
      background: none;
      border: none;
      color: #c33;
      cursor: pointer;
      font-size: 15px;
      padding: 0 3px;
      border-radius: 0;
      transform: none;
    }

    .ws-bloque-del:hover { transform: none; color: #a00; }

    .ws-pags { font-size: 11px; color: var(--muted); }

    .ws-reqs-label { font-size: 11px; font-weight: 600; color: var(--text); }

    .ws-reqs-chips { display: flex; flex-wrap: wrap; gap: 4px; }

    .ws-add-req { display: flex; gap: 4px; }

    .ws-add-req input {
      flex: 1;
      font-size: 11px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 5px;
    }

    /* ── Workspace footer ── */
    .ws-footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--card);
      border-top: 1px solid var(--line);
    }

    .ws-save-status { font-size: 12px; color: var(--muted); }
    .ws-save-status.ok { color: var(--ok-text); }
    .ws-save-status.err { color: var(--err-text); }

    /* ───────── BUTTONS ───────── */
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      transition: transform 0.12s;
      white-space: nowrap;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    button.alt {
      background: #eef3fb;
      color: #1f3f74;
      border: 1px solid #d7e5ff;
    }

    button.green {
      background: linear-gradient(135deg, var(--green), var(--green-2));
    }

    button.danger {
      background: #fef2f2;
      color: var(--err-text);
      border: 1px solid #f7c3c0;
    }

    button.sm {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 6px;
    }

    /* ───────── STATUS BAR ───────── */
    #estado {
      flex-shrink: 0;
      padding: 8px 16px;
      font-size: 12px;
      background: #eef2f8;
      color: #2a3648;
      border-top: 1px solid var(--line);
      min-height: 34px;
    }

    #estado.ok { background: var(--ok-bg); color: var(--ok-text); }
    #estado.err { background: var(--err-bg); color: var(--err-text); }

    /* ───────── MISC ───────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 15px;
      background: var(--card);
      border-radius: 14px;
      border: 1px dashed var(--line);
    }

    .empty-state p { margin: 8px 0 0; font-size: 13px; }

    input[type="file"] { display: none; }

    @media (max-width: 640px) {
      .page-header { padding: 10px 14px; }
      #tab-mis-mapeos { padding: 14px; }
      .nuevo-bar { padding: 10px 14px; flex-wrap: wrap; }
      #ws-bloques { width: 260px; }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <header class="page-header">
    <img src="icons/icon-128.png" alt="Logo" width="34" height="34" />
    <div>
      <h1>Gestión de Mapeos</h1>
      <p>Cada mapeo guarda la estructura de una sábana de referencia</p>
    </div>
  </header>

  <!-- TABS NAV -->
  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="mis-mapeos">📋 Mis Mapeos</button>
    <button class="tab-btn" data-tab="nuevo">+ Mappear Nuevo</button>
  </nav>

  <!-- NO SESION -->
  <div id="no-sesion" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);gap:8px;padding:40px;">
    <strong style="font-size:16px;">No hay sesión activa</strong>
    <p>Iniciá sesión desde la extensión para usar los mapeos.</p>
  </div>

  <!-- TAB: MIS MAPEOS -->
  <div id="tab-mis-mapeos" class="tab-pane active">
    <div class="toolbar">
      <button id="btn-importar" class="alt">⬆ Importar mapeo</button>
      <input id="input-importar" type="file" accept=".json" />
    </div>
    <div id="cards-container" class="cards-grid"></div>
  </div>

  <!-- TAB: MAPPEAR NUEVO -->
  <div id="tab-nuevo" class="tab-pane">

    <!-- Top bar: nombre del mapeo + botón cargar PDF -->
    <div class="nuevo-bar">
      <label for="nuevo-nombre">Nombre:</label>
      <input type="text" id="nuevo-nombre" placeholder="Ej: Recibos Empresa SA" autocomplete="off" />
      <button id="nuevo-btn-pdf" class="green">📄 Cargar PDF de referencia</button>
      <input id="nuevo-file-input" type="file" accept=".pdf" />
    </div>

    <!-- Dropzone (visible sin PDF) -->
    <div id="nuevo-dropzone">
      <div class="dropzone-inner">
        <span class="dropzone-icon">📂</span>
        <p>Arrastrá el PDF de referencia acá</p>
        <small>o usá el botón "Cargar PDF de referencia"</small>
      </div>
    </div>

    <!-- Workspace (visible con PDF cargado) -->
    <div id="nuevo-workspace" style="display:none;">
      <div class="ws-bar">
        <span class="ws-filename" id="ws-filename"></span>
        <span class="ws-status" id="ws-status"></span>
        <button id="ws-cambiar-pdf" class="alt sm">Cambiar PDF</button>
      </div>
      <div class="ws-body">
        <!-- Panel izquierdo: thumbnails -->
        <div id="ws-thumbs">
          <div class="thumbs-grid" id="ws-thumbs-grid"></div>
        </div>
        <!-- Panel derecho: bloques -->
        <aside id="ws-bloques">
          <div class="ws-sel-info" id="ws-sel-info">Seleccioná páginas a la izquierda</div>
          <button id="ws-crear-bloque" class="green" disabled>+ Crear bloque con selección</button>
          <p style="font-size:12px;font-weight:700;color:var(--text);margin-top:4px;">Bloques armados</p>
          <div id="ws-bloques-list"></div>
        </aside>
      </div>
      <div class="ws-footer">
        <button id="ws-btn-guardar" class="green">Guardar mapeo</button>
        <span class="ws-save-status" id="ws-save-status"></span>
      </div>
    </div>

  </div><!-- /tab-nuevo -->

</div><!-- /page-wrap -->

<!-- STATUS BAR -->
<p id="estado"></p>

<datalist id="dl-sobres"></datalist>
<script src="pdf.min.js"></script>
<script src="mapeos.js"></script>
</body>
</html>
